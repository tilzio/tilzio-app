<!doctype html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--ts-bg, #282828);
    color: var(--ts-text, #ebdbb2);
    font: 11px ui-monospace, Menlo, monospace;
  }
  button { font: inherit; }

  .dash { padding: 9px 10px 12px; display: flex; flex-direction: column; gap: 9px; }

  .topbar { display: flex; justify-content: flex-end; padding: 4px 6px 0; }
  .gear {
    background: transparent; border: none; cursor: pointer; line-height: 1;
    color: var(--ts-text-dim, #a89984); font-size: 12px; padding: 2px 5px;
    border-radius: var(--ts-radius, 4px);
  }
  .gear:hover { color: var(--ts-text, #ebdbb2); background: var(--ts-bg-elevated, #32302f); }

  .banner {
    font-size: 10px; color: var(--ts-amber, #fabd2f); padding: 5px 7px;
    border: 1px solid var(--ts-border, #3c3836); border-radius: var(--ts-radius, 4px);
    background: var(--ts-bg-elevated, #32302f);
  }

  /* provider header */
  .prov { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  /* provider/tool brand glyph: original Simple Icons path, tinted via currentColor */
  .prov .ic { width: 15px; height: 15px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; line-height: 0; }
  .prov .ic svg { display: block; width: 15px; height: 15px; }
  .prov b { flex: 1; color: var(--ts-text, #ebdbb2); font-size: 12px; font-weight: 400; }
  .prov .bdg { color: var(--ts-text-dim, #a89984); font-size: 10px; }
  .prov .cv { color: var(--ts-text-dim, #a89984); font-size: 10px; }

  .alertmark { color: var(--ts-red, #fb4934); margin-right: 3px; }

  /* block */
  .blkhd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .blkhd .lbl { color: var(--ts-text-dim, #a89984); font-size: 8px; letter-spacing: .12em; text-transform: uppercase; }

  /* view-toggle segment */
  .seg { display: flex; border: 1px solid var(--ts-border, #3c3836); border-radius: var(--ts-radius, 4px); overflow: hidden; cursor: pointer; }
  .seg span { font-size: 7px; padding: 1px 4px; color: var(--ts-text-dim, #a89984); text-transform: uppercase; letter-spacing: .04em; }
  .seg span.on { background: var(--ts-border, #3c3836); color: var(--ts-accent, #fe8019); }

  /* limits: meter bar */
  .meter { height: 7px; border-radius: var(--ts-radius, 4px); background: var(--ts-border, #3c3836); overflow: hidden; margin-top: 3px; }
  .meter i { display: block; height: 100%; border-radius: var(--ts-radius, 4px); }
  .mrow { display: flex; justify-content: space-between; font-size: 10px; color: var(--ts-text, #ebdbb2); }
  .mrow .r { color: var(--ts-text-dim, #a89984); font-size: 9px; }

  /* limits: ring */
  /* Limits in "rings" mode: a large hero donut (first limit) + small mini donuts. */
  .lr-wrap { display: flex; gap: 12px; align-items: center; margin-top: 2px; }
  .lr-side { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .lr-mrow { display: flex; align-items: center; gap: 8px; }
  .lr-mrow .nm { color: var(--ts-text, #ebdbb2); font-size: 10px; }
  .d { position: relative; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; }
  .d .arc { position: absolute; inset: 0; border-radius: 50%; }
  .d .arc::after { content: ''; position: absolute; border-radius: 50%; background: var(--ts-bg, #282828); }
  .d .val { position: relative; z-index: 1; line-height: 1; }
  .lr-hero-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .lr-hero-cap { color: var(--ts-text-dim, #a89984); font-size: 9px; text-transform: uppercase; letter-spacing: .06em; }
  .d.hero { width: 80px; height: 80px; }
  .d.hero .arc::after { inset: 8px; }
  .d.hero .val { font-size: 18px; font-weight: 600; }
  .d.mini { width: 40px; height: 40px; }
  .d.mini .arc::after { inset: 5px; }
  .d.mini .val { font-size: 10px; color: var(--ts-text, #ebdbb2); }

  /* history: bars */
  .bars { display: flex; align-items: flex-end; gap: 3px; height: 30px; }
  .bars i { flex: 1; display: block; min-height: 2px; background: var(--ts-border, #3c3836); border-radius: 2px 2px 0 0; }
  .bars i.hi { background: var(--ts-accent, #fe8019); }

  /* tokens */
  .tk { display: flex; justify-content: space-between; font-size: 10px; color: var(--ts-text, #ebdbb2); padding: 1px 0; }
  .tkgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 10px; }

  .divf { border-top: 1px solid var(--ts-border, #3c3836); margin: 2px 0; }
  .provdiv { border-top: 1px solid var(--ts-border, #3c3836); margin: 1px 0; }

  /* settings screen */
  .stg-hd {
    display: flex; align-items: center; justify-content: space-between; padding: 8px 10px;
    border-bottom: 1px solid var(--ts-border, #3c3836);
  }
  .stg-hd button {
    background: transparent; border: none; cursor: pointer; color: var(--ts-text-dim, #a89984);
    font-size: 11px; padding: 2px 4px; border-radius: var(--ts-radius, 4px);
  }
  .stg-hd button:hover { color: var(--ts-text, #ebdbb2); background: var(--ts-bg-elevated, #32302f); }

  .set { padding: 8px 10px 12px; display: flex; flex-direction: column; gap: 4px; }
  .sechd {
    color: var(--ts-accent, #fe8019); font-size: 8px; letter-spacing: .14em; text-transform: uppercase;
    margin: 9px 0 3px; border-bottom: 1px solid var(--ts-border, #3c3836); padding-bottom: 3px;
  }
  .sechd:first-child { margin-top: 2px; }
  .grpn { color: var(--ts-text-dim, #a89984); font-size: 8px; text-transform: uppercase; letter-spacing: .08em; margin: 4px 0 1px; }
  .row { display: flex; align-items: center; gap: 7px; padding: 3px 0; font-size: 11px; color: var(--ts-text, #ebdbb2); }
  .row .grip { color: var(--ts-text-dim, #a89984); font-size: 11px; cursor: grab; }
  .row .nm { flex: 1; }
  .row .sub { color: var(--ts-text-dim, #a89984); font-size: 8px; text-transform: uppercase; }
  .row .ic { width: 13px; height: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; line-height: 0; }
  .row .ic svg { display: block; width: 13px; height: 13px; }
  .row.dragover { outline: 1px dashed var(--ts-accent, #fe8019); outline-offset: -1px; }

  .sw { width: 22px; height: 12px; border-radius: 7px; background: var(--ts-border, #3c3836); position: relative; flex-shrink: 0; cursor: pointer; }
  .sw.on { background: var(--ts-accent, #fe8019); }
  .sw::after { content: ''; position: absolute; top: 2px; left: 2px; width: 8px; height: 8px; border-radius: 50%; background: var(--ts-text, #ebdbb2); }
  .sw.on::after { left: 12px; background: var(--ts-bg, #282828); }

  .step { display: flex; align-items: center; gap: 8px; }
  .step .b {
    width: 16px; height: 16px; border: 1px solid var(--ts-border, #3c3836); border-radius: 4px;
    display: flex; align-items: center; justify-content: center; color: var(--ts-text-dim, #a89984);
    font-size: 11px; cursor: pointer;
  }
  .step .b:hover { color: var(--ts-text, #ebdbb2); background: var(--ts-bg-elevated, #32302f); }
  .step .v { color: var(--ts-text, #ebdbb2); font-size: 11px; min-width: 30px; text-align: center; }
</style>
</head>
<body>
<div id="root"></div>

  var rows = [];
  if (cardMetricOn('card.5h', settings) && t.window && t.window.utilPct != null) {
    rows.push({ label: '5h', pct: t.window.utilPct, trendKey: t.id + '.5h', showReset: true, resetAt: t.window.resetAt, resetMin: t.window.resetMin });
  }
  if (cardMetricOn('card.week', settings) && t.week && t.week.utilPct != null) {
    rows.push({ label: 'Week', pct: t.week.utilPct, trendKey: t.id + '.week' });
  }
  if (cardMetricOn('card.weekSonnet', settings) && t.sonnet && t.sonnet.utilPct != null) {
    // label приходит из воркера: имя модели из 'Current week (<model>)' (напр. 'Fable').
    rows.push({ label: str(t.sonnet.label) || 'Model', pct: t.sonnet.utilPct });
  }
  if (!rows.length) return null;

  var block = ce('div', 'blk');
  var hd = ce('div', 'blkhd');
  var lbl = ce('span', 'lbl');
  if (limitAlerts(t, settings)) lbl.appendChild(txt('span', 'alertmark', '⚠'));
  lbl.appendChild(document.createTextNode('Limits'));
  hd.appendChild(lbl);
  if (settings.showFill !== false) hd.appendChild(renderSeg('limits', ['meter', 'rings'], settings.limitViz || 'meter'));
  block.appendChild(hd);

  var mode = (settings.showFill === false) ? 'text' : ((settings.limitViz === 'rings') ? 'rings' : 'meter');
  var alertPct = settings.alertPct;

  if (mode === 'rings') {
    var makeDonut = function (r, kind) {
      var pc = Math.max(0, Math.min(100, num(r.pct)));
      var color = threshColorHex(r.pct, alertPct);
      var d = ce('div', 'd');
      d.classList.add(kind);
      var arc = ce('div', 'arc');
      arc.style.background = 'conic-gradient(' + color + ' 0 ' + pc + '%, var(--ts-border, #3c3836) ' + pc + '% 100%)';
      d.appendChild(arc);
      var val = txt('div', 'val', (kind === 'hero') ? fmtPct(r.pct) : String(Math.round(num(r.pct))));
      val.style.color = color;
      d.appendChild(val);
      return d;
    };
    var wrap = ce('div', 'lr-wrap');
    var hero = rows[0];
    var heroCol = ce('div', 'lr-hero-col');
    heroCol.appendChild(makeDonut(hero, 'hero'));
    heroCol.appendChild(txt('div', 'lr-hero-cap', hero.label));
    wrap.appendChild(heroCol);
    if (rows.length > 1) {
      var side = ce('div', 'lr-side');
      for (var si = 1; si < rows.length; si++) {
        var mr = ce('div', 'lr-mrow');
        mr.appendChild(makeDonut(rows[si], 'mini'));
        mr.appendChild(txt('span', 'nm', rows[si].label));
        side.appendChild(mr);
      }
      wrap.appendChild(side);
    }
    block.appendChild(wrap);
    if (hero.showReset) {
      var hrm = hero.resetAt ? minutesUntilISO(hero.resetAt, Date.now()) : hero.resetMin;
      if (hrm != null) {
        var hrr = ce('div', 'mrow');
        hrr.style.marginTop = '8px';
        hrr.appendChild(txt('span', 'r', hero.label + ' resets'));
        hrr.appendChild(txt('span', 'r', fmtDurationMin(hrm)));
        block.appendChild(hrr);
      }
    }
    return block;
  }

  rows.forEach(function (r, idx) {
    var pctClamped = Math.max(0, Math.min(100, num(r.pct)));
    var color = threshColorHex(r.pct, alertPct);

    var rowEl = ce('div');
    if (idx > 0) rowEl.style.marginTop = '5px';

    var mrow = ce('div', 'mrow');
    mrow.appendChild(txt('span', null, r.label));
    var right = ce('span');
    right.style.color = color;
    right.appendChild(document.createTextNode(fmtPct(r.pct)));
    var arrow = (STATE.trends && r.trendKey) ? STATE.trends[r.trendKey] : '';
    if (arrow) {
      var a = txt('span', null, ' ' + arrow);
      right.appendChild(a);
    }
    mrow.appendChild(right);
    rowEl.appendChild(mrow);

    if (mode === 'meter') {
      var meter = ce('div', 'meter');
      var i = ce('i');
      i.style.width = pctClamped + '%';
      i.style.background = color;
      meter.appendChild(i);
      rowEl.appendChild(meter);
    }
    // mode === 'text' → bare % already shown in mrow, nothing more to draw.

    if (r.showReset) {
      var resetMin = r.resetAt ? minutesUntilISO(r.resetAt, Date.now()) : r.resetMin;
      if (resetMin != null) {
        var rr = ce('div', 'mrow');
        rr.style.marginTop = '5px';
        rr.appendChild(txt('span', 'r', '5h resets'));
        rr.appendChild(txt('span', 'r', fmtDurationMin(resetMin)));
        rowEl.appendChild(rr);
      }
    }

    block.appendChild(rowEl);
  });

  return block;
}

function renderSpendBlock(t, settings) {
  var rows = [];
  if (cardMetricOn('card.daySpend', settings) && t.today && t.today.costUSD != null) rows.push(['Today', t.today.costUSD]);
  if (cardMetricOn('card.weekSpend', settings) && t.week && t.week.costUSD != null) rows.push(['Week', t.week.costUSD]);
  if (cardMetricOn('card.monthSpend', settings) && t.month && num(t.month.costUSD) > 0) rows.push(['Month', t.month.costUSD]);
  if (!rows.length) return null;

  var block = ce('div', 'blk');
  var hd = ce('div', 'blkhd');
  hd.appendChild(txt('span', 'lbl', 'Spend'));
  block.appendChild(hd);

  rows.forEach(function (r, idx) {
    var mrow = ce('div', 'mrow');
    if (idx > 0) mrow.style.marginTop = '3px';
    mrow.appendChild(txt('span', null, r[0]));
    var val = txt('span', null, fmtMoney(r[1]));
    val.style.color = 'var(--ts-green, #b8bb26)';
    mrow.appendChild(val);
    block.appendChild(mrow);
  });

  return block;
}

function renderHistoryBlock(t, settings) {
  if (!cardMetricOn('card.spark', settings)) return null;
  var vals = (t.spark7 || []).map(num);
  if (!vals.length) return null;

  var block = ce('div', 'blk');
  var hd = ce('div', 'blkhd');
  hd.appendChild(txt('span', 'lbl', 'History · 7d $'));
  hd.appendChild(renderSeg('history', ['bars', 'line'], settings.historyViz || 'bars'));
  block.appendChild(hd);
  block.appendChild(renderSpark(vals, t.spark7dates, settings.historyViz));
  return block;
}

function renderTokensBlock(t, settings) {
  if (!cardMetricOn('card.tokens', settings)) return null;
  if (!t.today || !t.today.tok) return null;
  var tok = t.today.tok;

  var block = ce('div', 'blk');
  var hd = ce('div', 'blkhd');
  hd.appendChild(txt('span', 'lbl', 'Tokens · today'));
  block.appendChild(hd);

  function tkRow(label, value) {
    var r = ce('div', 'tk');
    r.appendChild(txt('span', null, label));
    r.appendChild(txt('span', null, value));
    return r;
  }
  var grid = ce('div', 'tkgrid');
  grid.appendChild(tkRow('In', fmtTokens(tok.input)));
  grid.appendChild(tkRow('Out', fmtTokens(tok.output)));
  grid.appendChild(tkRow('C·cr', fmtTokens(tok.cacheCreate)));
  grid.appendChild(tkRow('C·rd', fmtTokens(tok.cacheRead)));
  block.appendChild(grid);

  var costRow = ce('div', 'tk');
  costRow.style.marginTop = '2px';
  costRow.appendChild(txt('span', null, 'Cost'));
  var val = txt('span', null, fmtMoney(t.today.costUSD));
  val.style.color = 'var(--ts-amber, #fabd2f)';
  costRow.appendChild(val);
  block.appendChild(costRow);

  return block;
}

function renderBlock(block, t, settings) {
  if (block === 'limits') return renderLimitsBlock(t, settings);
  if (block === 'spend') return renderSpendBlock(t, settings);
  if (block === 'history') return renderHistoryBlock(t, settings);
  if (block === 'tokens') return renderTokensBlock(t, settings);
  return null;
}

function renderProvider(t, settings) {
  var wrap = ce('div');
  var collapsed = !!(settings.collapsed && settings.collapsed[t.id]);

  var hd = ce('div', 'prov');
  hd.onclick = function () { post({ type: 'toggleCollapse', provider: t.id }); };
  var ic = ce('span', 'ic');
  ic.style.color = brandColor(t.id);
  ic.appendChild(providerGlyph(t.id, 15));
  hd.appendChild(ic);
  hd.appendChild(txt('b', null, t.name || t.id));
  var summary = providerSummary(t);
  if (summary) hd.appendChild(txt('span', 'bdg', summary));
  hd.appendChild(txt('span', 'cv', collapsed ? '▸' : '▾'));
  wrap.appendChild(hd);

  if (collapsed) return wrap;

  var blocks = orderedBlocks(settings.blockOrder);
  var rendered = 0;
  blocks.forEach(function (block) {
    if (settings.blocks && settings.blocks[block] === false) return;
    var blockEl = renderBlock(block, t, settings);
    if (!blockEl) return;
    if (rendered > 0) wrap.appendChild(ce('div', 'divf'));
    wrap.appendChild(blockEl);
    rendered++;
  });

  return wrap;
}

function renderCombinedHistory(tools, settings) {
  var sums = [];
  tools.forEach(function (t) {
    var vals = (t.spark7 || []).map(num);
    vals.forEach(function (v, i) { sums[i] = (sums[i] || 0) + v; });
  });
  if (!sums.length) return null;

  var wrap = ce('div');
  var hd = ce('div', 'blkhd');
  hd.appendChild(txt('span', 'lbl', 'Combined · 7d $'));
  hd.appendChild(renderSeg('history', ['bars', 'line'], settings.historyViz || 'bars'));
  wrap.appendChild(hd);
  var dates = (tools[0] && tools[0].spark7dates) || [];
  wrap.appendChild(renderSpark(sums, dates, settings.historyViz));
  return wrap;
}

function renderDashboard() {
  var root = ce('div', 'dash');

  var topbar = ce('div', 'topbar');
  var refresh = txt('button', 'gear', '↻');
  refresh.type = 'button';
  refresh.title = 'Refresh';
  refresh.onclick = function () { post({ type: 'refresh' }); };
  topbar.appendChild(refresh);
  var gear = txt('button', 'gear', '⚙');
  gear.type = 'button';
  gear.title = 'Settings';
  gear.onclick = function () { MODE = 'settings'; render(); };
  topbar.appendChild(gear);
  root.appendChild(topbar);

  var diag = STATE.diag || {};
  if (diag.limitsUnavail) root.appendChild(txt('div', 'banner', 'Limits unavailable: ' + diag.limitsUnavail));
  if (diag.ccusageMissing) root.appendChild(txt('div', 'banner', '⚠ Install ccusage'));

  var settings = STATE.settings || {};
  var tools = STATE.tools || [];
  var shown = tools.filter(function (t) { return t && (!settings.tools || settings.tools[t.id] !== false); });

  shown.forEach(function (t, idx) {
    if (idx > 0) root.appendChild(ce('div', 'provdiv'));
    root.appendChild(renderProvider(t, settings));
  });

  if (shown.length && cardMetricOn('board.spark7all', settings)) {
    var combined = renderCombinedHistory(shown, settings);
    if (combined) {
      root.appendChild(ce('div', 'provdiv'));
      root.appendChild(combined);
    }
  }

  return root;
}

// --- settings screen: local metadata (mirrors main.js TOOLS/CARD_METRICS/BOARD_METRICS/SB_*) ---
var TOOL_META = [
  { id: 'claude', name: 'Claude', hasSource: true },
  { id: 'codex',  name: 'Codex',  hasSource: true },
  { id: 'cursor', name: 'Cursor', hasSource: false },
  { id: 'gemini', name: 'Gemini', hasSource: false }
];
var BLOCK_TITLES = { limits: 'Limits', spend: 'Spend', history: 'History', tokens: 'Tokens' };
// Per-metric groups, titles copied verbatim from main.js CARD_METRICS/BOARD_METRICS.
var METRIC_GROUPS = [
  { label: 'Limits', items: [
      { id: 'card.5h', title: '5h limit' },
      { id: 'card.week', title: 'Weekly limit' },
      { id: 'card.weekSonnet', title: 'Model week %' }
  ] },
  { label: 'Spend', items: [
      { id: 'card.daySpend', title: '$ Today' },
      { id: 'card.weekSpend', title: '$ Week' },
      { id: 'card.monthSpend', title: '$ Month' }
  ] },
  { label: 'History', items: [
      { id: 'card.spark', title: '7d history' }
  ] },
  { label: 'Tokens', items: [
      { id: 'card.tokens', title: 'Token breakdown' }
  ] },
  { label: 'Combined', items: [
      { id: 'board.spark7all', title: 'Combined 7d sparkline' }
  ] }
];
// Chip titles/defaults copied verbatim from main.js SB_TEMPLATES; groups from SB_PROVIDERS.
var CHIP_TITLES = { name: 'Name', '5h': '5h limit', week: 'Weekly limit', wkReset: 'Weekly reset', today: '$ today', tok: 'Tokens today', reset: '5h reset' };
var CHIP_DEFAULT_ON = { name: true, '5h': true, week: true, today: true, reset: true, tok: false, wkReset: false };
var CHIP_GROUPS = [
  { id: 'claude', label: 'Claude', keys: ['name', '5h', 'week', 'wkReset', 'today', 'tok', 'reset'] },
  { id: 'codex',  label: 'Codex',  keys: ['name', 'today', 'tok'] }
];
function chipOn(provider, key, settings) {
  var s = settings || {};
  var k = provider + '.' + key;
  if (s.chips && Object.prototype.hasOwnProperty.call(s.chips, k)) return !!s.chips[k];
  return !!CHIP_DEFAULT_ON[key];
}

// --- settings screen: DOM builders ---
function renderSectionHeader(label) { return txt('div', 'sechd', label); }
function renderGroupLabel(label) { return txt('div', 'grpn', label); }
function renderSwitch(on, onClick) {
  var sw = ce('span', on ? 'sw on' : 'sw');
  sw.onclick = onClick;
  return sw;
}
function renderRow(parts, on, onClick) {
  var row = ce('div', 'row');
  parts.forEach(function (p) { row.appendChild(p); });
  row.appendChild(renderSwitch(on, onClick));
  return row;
}
function renderToggleRow(label, on, onClick) {
  return renderRow([txt('span', 'nm', label)], on, onClick);
}
function renderToolRow(tm, settings) {
  var ic = ce('span', 'ic');
  ic.style.color = brandColor(tm.id);
  ic.appendChild(providerGlyph(tm.id, 13));
  var parts = [ic, txt('span', 'nm', tm.name)];
  if (!tm.hasSource) parts.push(txt('span', 'sub', 'no source'));
  var on = !!(settings.tools && settings.tools[tm.id] === true);
  return renderRow(parts, on, function () { post({ type: 'toggleTool', tool: tm.id }); });
}
function renderAlertRow(settings) {
  var row = ce('div', 'row');
  row.appendChild(txt('span', 'nm', 'Alert threshold'));
  var alertPct = (settings.alertPct != null) ? settings.alertPct : 80;
  var step = ce('div', 'step');
  var minus = txt('span', 'b', '−');
  minus.onclick = function () { post({ type: 'setAlert', delta: -5 }); };
  step.appendChild(minus);
  step.appendChild(txt('span', 'v', fmtPct(alertPct)));
  var plus = txt('span', 'b', '+');
  plus.onclick = function () { post({ type: 'setAlert', delta: 5 }); };
  step.appendChild(plus);
  row.appendChild(step);
  return row;
}
function renderBlockRow(block, settings) {
  var grip = txt('span', 'grip', '⠿');
  var parts = [grip, txt('span', 'nm', BLOCK_TITLES[block] || block)];
  var on = !settings.blocks || settings.blocks[block] !== false;
  var row = renderRow(parts, on, function (ev) { ev.stopPropagation(); post({ type: 'toggleBlock', block: block }); });

  row.draggable = true;
  row.addEventListener('dragstart', function (ev) {
    dragging = true;
    ev.dataTransfer.effectAllowed = 'move';
    ev.dataTransfer.setData('text/plain', block);
  });
  // dragend приходит на источнике и после drop, и после отмены (Esc / мимо цели) —
  // единая точка снятия флага + чистки повисших .dragover.
  row.addEventListener('dragend', endDrag);
  row.addEventListener('dragover', function (ev) {
    ev.preventDefault();
    ev.dataTransfer.dropEffect = 'move';
    row.classList.add('dragover');
  });
  row.addEventListener('dragleave', function () { row.classList.remove('dragover'); });
  row.addEventListener('drop', function (ev) {
    ev.preventDefault();
    row.classList.remove('dragover');
    var dragged = ev.dataTransfer.getData('text/plain');
    if (!dragged || dragged === block) { endDrag(); return; }
    var order = orderedBlocks(settings.blockOrder);
    var from = order.indexOf(dragged);
    var to = order.indexOf(block);
    if (from >= 0 && to >= 0) {
      order.splice(from, 1);
      order.splice(to, 0, dragged);
      post({ type: 'reorderBlocks', order: order });
    }
    endDrag();
  });
  return row;
}

function renderSettings() {
  var root = ce('div');
  var hd = ce('div', 'stg-hd');
  var back = txt('button', null, '‹ Settings');
  back.type = 'button';
  back.onclick = function () { MODE = 'dash'; render(); };
  var close = txt('button', null, '✕');
  close.type = 'button';
  close.onclick = function () { MODE = 'dash'; render(); };
  hd.appendChild(back);
  hd.appendChild(close);
  root.appendChild(hd);

  var settings = STATE.settings || {};
  var body = ce('div', 'set');

  body.appendChild(renderSectionHeader('Tools'));
  TOOL_META.forEach(function (tm) { body.appendChild(renderToolRow(tm, settings)); });

  body.appendChild(renderSectionHeader('Alerts'));
  body.appendChild(renderAlertRow(settings));

  body.appendChild(renderSectionHeader('Display'));
  body.appendChild(renderToggleRow('Fill scale', settings.showFill !== false, function () { post({ type: 'toggleFill' }); }));

  body.appendChild(renderSectionHeader('Blocks · drag to reorder'));
  orderedBlocks(settings.blockOrder).forEach(function (block) { body.appendChild(renderBlockRow(block, settings)); });

  body.appendChild(renderSectionHeader('Metrics'));
  METRIC_GROUPS.forEach(function (grp) {
    body.appendChild(renderGroupLabel(grp.label));
    grp.items.forEach(function (m) {
      body.appendChild(renderToggleRow(m.title, cardMetricOn(m.id, settings), function () { post({ type: 'toggleMetric', id: m.id }); }));
    });
  });

  body.appendChild(renderSectionHeader('Status bar chips'));
  CHIP_GROUPS.forEach(function (grp) {
    body.appendChild(renderGroupLabel(grp.label));
    grp.keys.forEach(function (key) {
      var title = CHIP_TITLES[key] || key;
      body.appendChild(renderToggleRow(title, chipOn(grp.id, key, settings), function () { post({ type: 'toggleChip', provider: grp.id, key: key }); }));
    });
  });

  root.appendChild(body);
  return root;
}

function render() {
  if (dragging) { pendingRender = true; return; }   // не рушить DOM под курсором — дорисуем на dragend
  var root = document.getElementById('root');
  root.innerHTML = '';
  root.appendChild(MODE === 'settings' ? renderSettings() : renderDashboard());
}

// --- bridge wiring ---
window.host.onMessage(function (m) {
  if (!m || m.type !== 'state') return;
  STATE = { tools: m.tools || [], settings: m.settings || {}, trends: m.trends || {}, diag: m.diag || {} };
  render();
});
window.addEventListener('load', function () { window.host.post({ type: 'ready' }); });
setInterval(render, 30000); // re-tick reset countdowns locally (recomputed from resetAt)

render(); // initial paint before the first 'state' snapshot arrives
</script>
</body>
